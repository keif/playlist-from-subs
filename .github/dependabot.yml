version: 2
updates:
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      google-auth:
        patterns:
          - "google-auth*"
          - "google-api-python-client"
      flask:
        patterns:
          - "Flask*"
          - "Werkzeug"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    labels:
      - "dependencies"
